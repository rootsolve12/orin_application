name: orin
description: Smart college event management platform
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.10.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.7
  firebase_messaging: ^15.1.6
  firebase_analytics: ^11.3.6
  cloud_functions: ^5.1.3

  go_router: ^14.8.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  lottie: ^3.1.3
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  intl: ^0.20.2
  image_picker: ^1.1.1
  flutter_image_compress: ^2.3.0
  uuid: ^4.5.0
  equatable: ^2.0.5

  flutter_staggered_animations: ^1.1.1
  timeago: ^3.7.0
  flutter_quill: ^11.5.1
  percent_indicator: ^4.2.3

  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  csv: ^6.0.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.3.11

flutter:
  uses-material-design: true
