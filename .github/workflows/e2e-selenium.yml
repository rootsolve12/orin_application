name: 🧪 Orin E2E Selenium Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'selenium-testing/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'selenium-testing/**'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - edge
          - firefox
      headless:
        description: 'Run in headless mode'
        required: false
        default: 'true'
        type: boolean

# Allow only one concurrent run per branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome]

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js Setup ──────────────────────────────────────────────────
      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            selenium-testing/package-lock.json

      # ── 3. Install Frontend Dependencies ─────────────────────────────────
      - name: 📦 Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      # ── 4. Build Frontend ─────────────────────────────────────────────────
      - name: 🏗️ Build React Application
        run: npm run build
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── 5. Start Dev Server in background ────────────────────────────────
      - name: 🚀 Start Vite Dev Server
        run: |
          npm run dev &
          echo "Waiting for dev server to be ready..."
          npx wait-on http://localhost:5173 --timeout 60000
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      # ── 6. Setup Chrome ───────────────────────────────────────────────────
      - name: 🌐 Setup Chrome Browser
        uses: browser-actions/setup-chrome@v1
        if: matrix.browser == 'chrome'
        with:
          chrome-version: stable

      # ── 7. Install Selenium Framework Dependencies ────────────────────────
      - name: 📦 Install Selenium Framework Dependencies
        run: npm install
        working-directory: selenium-testing

      # ── 8. Run E2E Tests ──────────────────────────────────────────────────
      - name: 🧪 Run E2E Tests
        run: npm run test:ci
        working-directory: selenium-testing
        env:
          APP_URL: http://localhost:5173
          BROWSER: ${{ github.event.inputs.browser || matrix.browser }}
          HEADLESS: ${{ github.event.inputs.headless || 'true' }}
          TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          NODE_ENV: ci

      # ── 9. Upload Test Reports ────────────────────────────────────────────
      - name: 📊 Upload HTML Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-html-report-${{ matrix.browser }}
          path: selenium-testing/reports/html/
          retention-days: 30

      - name: 📊 Upload Excel Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-excel-report-${{ matrix.browser }}
          path: selenium-testing/reports/*.xlsx
          retention-days: 30

      - name: 📸 Upload Failure Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots-${{ matrix.browser }}
          path: selenium-testing/reports/screenshots/
          retention-days: 14

      - name: 📄 Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-logs-${{ matrix.browser }}
          path: selenium-testing/reports/logs/
          retention-days: 7

  # ── Summary Job ──────────────────────────────────────────────────────────
  report-summary:
    name: 📋 Test Summary
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: always()

    steps:
      - name: 📥 Download HTML Report
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-html-report-*
          merge-multiple: true
          path: reports/

      - name: 📋 Generate Summary
        run: |
          echo "## 🧪 Orin E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chrome  | ${{ needs.e2e-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Reports**: Download the artifacts from the workflow run for detailed Excel and HTML reports." >> $GITHUB_STEP_SUMMARY
          echo "📸 **Screenshots**: Failure screenshots are attached if any tests failed." >> $GITHUB_STEP_SUMMARY
