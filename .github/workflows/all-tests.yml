name: All Tests — Selenium · Appium · Load · Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # JOB 1 — SELENIUM E2E TESTS (Web Frontend)
  # ============================================================
  selenium-tests:
    name: 🌐 Selenium E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Start the backend server (needed by Selenium tests)
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Start Backend Server
        working-directory: backend
        run: |
          node server.js &
          sleep 3
          echo "Backend server started on port 5000"
        env:
          JWT_SECRET: ci_test_secret_key_for_github_actions_only_do_not_use_in_prod
          PORT: 5000

      # Install Selenium test dependencies
      - name: Install Selenium Test Dependencies
        working-directory: selenium-tests
        run: npm ci 2>/dev/null || npm install

      # Run Selenium E2E tests (generates Excel report)
      - name: Run Selenium E2E Tests
        working-directory: selenium-tests
        run: node tests/login-tests.js
        env:
          BASE_URL: http://localhost:5000
          CI: true

      # Upload Selenium Excel report as artifact
      - name: Upload Selenium Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-e2e-reports
          path: |
            selenium-tests/reports/*.xlsx
          retention-days: 30

  # ============================================================
  # JOB 2 — APPIUM MOBILE TESTS (App Frontend)
  # ============================================================
  appium-tests:
    name: 📱 Appium Mobile Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Start the backend server
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Start Backend Server
        working-directory: backend
        run: |
          node server.js &
          sleep 3
          echo "Backend server started on port 5000"
        env:
          JWT_SECRET: ci_test_secret_key_for_github_actions_only_do_not_use_in_prod
          PORT: 5000

      # Install Appium test dependencies
      - name: Install Appium Test Dependencies
        working-directory: appium-tests
        run: npm ci 2>/dev/null || npm install

      # Run Appium mobile tests (generates Excel report)
      - name: Run Appium Mobile Tests
        working-directory: appium-tests
        run: node tests/appium-tests.js
        env:
          BASE_URL: http://localhost:5000
          CI: true

      # Upload Appium Excel report as artifact
      - name: Upload Appium Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-mobile-reports
          path: |
            appium-tests/reports/*.xlsx
          retention-days: 30

  # ============================================================
  # JOB 3 — BASELINE / LOAD TESTING (100 VUs, 60s)
  # ============================================================
  load-tests:
    name: ⚡ Baseline Load Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Start the backend server
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Start Backend Server
        working-directory: backend
        run: |
          node server.js &
          sleep 3
          echo "Backend server started on port 5000"
        env:
          JWT_SECRET: ci_test_secret_key_for_github_actions_only_do_not_use_in_prod
          PORT: 5000

      # Install load testing dependencies
      - name: Install Load Test Dependencies
        working-directory: load-testing
        run: npm ci 2>/dev/null || npm install

      # Run load tests (100 VUs, 60s, generates Excel report)
      - name: Run Baseline Load Test
        working-directory: load-testing
        run: node run-load-test.js
        env:
          BASE_URL: http://localhost:5000
          CI: true

      # Upload Load Test Excel report as artifact
      - name: Upload Load Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-reports
          path: |
            load-testing/reports/*.xlsx
          retention-days: 30

  # ============================================================
  # JOB 4 — SECURITY ASSESSMENT (310 Test Cases)
  # ============================================================
  security-tests:
    name: 🔐 Security Assessment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Run npm audit on backend
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Run npm audit
        working-directory: backend
        continue-on-error: true
        run: |
          echo "## 🔍 Dependency Audit Results" >> $GITHUB_STEP_SUMMARY
          npm audit --production 2>&1 | tee audit-results.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -n 50 audit-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # Scan for hardcoded secrets
      - name: Scan for Hardcoded Secrets
        continue-on-error: true
        run: |
          echo "## 🔑 Hardcoded Secrets Scan" >> $GITHUB_STEP_SUMMARY
          FOUND=0
          if grep -rn "super_secret_key" backend/ --include="*.js" | grep -v node_modules; then
            echo "⚠️ **CRITICAL**: Hardcoded JWT secret found" >> $GITHUB_STEP_SUMMARY
            FOUND=1
          fi
          if [ $FOUND -eq 0 ]; then
            echo "✅ No hardcoded secrets detected." >> $GITHUB_STEP_SUMMARY
          fi

      # Check security configuration
      - name: Check Security Configuration
        continue-on-error: true
        run: |
          echo "## ⚙️ Security Configuration" >> $GITHUB_STEP_SUMMARY
          if grep -q "helmet" backend/package.json; then
            echo "✅ helmet security headers installed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ helmet not installed" >> $GITHUB_STEP_SUMMARY
          fi
          if grep -q "compression" backend/package.json; then
            echo "✅ compression middleware installed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ compression not installed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "backend/Dockerfile" ]; then
            echo "✅ Dockerfile present" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No Dockerfile found" >> $GITHUB_STEP_SUMMARY
          fi

      # Install security report generator dependencies
      - name: Install Security Report Dependencies
        working-directory: vulnerability-test-results
        run: npm ci 2>/dev/null || npm install

      # Generate all security Excel reports
      - name: Generate Security Findings Report
        working-directory: vulnerability-test-results
        run: node generate-excel.js

      - name: Generate Security Test Cases Report (310 cases)
        working-directory: vulnerability-test-results
        run: node generate-test-cases.js

      # Upload all security Excel reports as artifacts
      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-assessment-reports
          path: |
            vulnerability-test-results/findings.xlsx
            vulnerability-test-results/endpoint-inventory.xlsx
            vulnerability-test-results/security-test-cases.xlsx
            vulnerability-test-results/security-review.md
            vulnerability-test-results/executive-summary.md
            vulnerability-test-results/dependency-report.md
          retention-days: 30

  # ============================================================
  # JOB 5 — COMBINED SUMMARY (runs after all tests complete)
  # ============================================================
  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [selenium-tests, appium-tests, load-tests, security-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download ALL artifacts from previous jobs
      - name: Download Selenium Reports
        uses: actions/download-artifact@v4
        with:
          name: selenium-e2e-reports
          path: all-reports/selenium
        continue-on-error: true

      - name: Download Appium Reports
        uses: actions/download-artifact@v4
        with:
          name: appium-mobile-reports
          path: all-reports/appium
        continue-on-error: true

      - name: Download Load Test Reports
        uses: actions/download-artifact@v4
        with:
          name: load-test-reports
          path: all-reports/load-testing
        continue-on-error: true

      - name: Download Security Reports
        uses: actions/download-artifact@v4
        with:
          name: security-assessment-reports
          path: all-reports/security
        continue-on-error: true

      # List all collected reports
      - name: List All Reports
        run: |
          echo "## 📦 All Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Selenium E2E Reports" >> $GITHUB_STEP_SUMMARY
          ls -la all-reports/selenium/ 2>/dev/null && echo "✅ Found" >> $GITHUB_STEP_SUMMARY || echo "⚠️ Not available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Appium Mobile Reports" >> $GITHUB_STEP_SUMMARY
          ls -la all-reports/appium/ 2>/dev/null && echo "✅ Found" >> $GITHUB_STEP_SUMMARY || echo "⚠️ Not available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚡ Load Test Reports" >> $GITHUB_STEP_SUMMARY
          ls -la all-reports/load-testing/ 2>/dev/null && echo "✅ Found" >> $GITHUB_STEP_SUMMARY || echo "⚠️ Not available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔐 Security Reports" >> $GITHUB_STEP_SUMMARY
          ls -la all-reports/security/ 2>/dev/null && echo "✅ Found" >> $GITHUB_STEP_SUMMARY || echo "⚠️ Not available" >> $GITHUB_STEP_SUMMARY

      # Upload combined artifact with ALL Excel reports
      - name: Upload All Test Reports (Combined)
        uses: actions/upload-artifact@v4
        with:
          name: all-test-reports-combined
          path: all-reports/
          retention-days: 90

      # Final summary
      - name: Publish Final Summary
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "## 🏁 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status | Reports |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Selenium E2E (300+ cases) | ${{ needs.selenium-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} | \`selenium-e2e-reports\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 Appium Mobile (300+ cases) | ${{ needs.appium-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} | \`appium-mobile-reports\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ Load Test (100 VUs, 60s) | ${{ needs.load-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} | \`load-test-reports\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Security (310 cases) | ${{ needs.security-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} | \`security-assessment-reports\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 📥 **Download all reports**: Use the \`all-test-reports-combined\` artifact for a single zip with every Excel report." >> $GITHUB_STEP_SUMMARY
