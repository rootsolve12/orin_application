name: Selenium E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        working-directory: ./selenium-testing
        run: npm ci || npm install

      - name: Run Comprehensive Selenium Suite
        working-directory: ./selenium-testing
        id: selenium-tests
        run: npm run test:master
        continue-on-error: true

      - name: Retry Failed Tests
        if: steps.selenium-tests.outcome == 'failure'
        working-directory: ./selenium-testing
        run: |
          echo "Initial run failed, attempting 1 retry..."
          npm run test:master
        
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orin-e2e-report
          path: selenium-testing/reports/
          retention-days: 7
